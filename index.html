<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Music</title>
    <link rel="apple-touch-icon" href="icon.png?v=1">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #0a84ff;
            --bg: #0d0d0f;
            --card: #1c1c1e;
            --card2: #2c2c2e;
            --text: #ffffff;
            --subtext: #8e8e93;
            --border: #3a3a3c;
            --danger: #ff453a;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 220px; user-select: none; min-height: 100vh; }

        /* ヘッダー */
        .header { background: rgba(13,13,15,0.92); padding: env(safe-area-inset-top) 20px 0; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(20px); border-bottom: 0.5px solid var(--border); }
        .header-top { display: flex; align-items: center; justify-content: space-between; padding: 14px 0 10px; }
        .header-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
        .shuffle-btn { background: var(--card2); border: none; color: var(--primary); font-size: 13px; font-weight: 600; padding: 7px 14px; border-radius: 20px; cursor: pointer; }
        .shuffle-btn.active { background: var(--primary); color: #fff; }

        /* タブ */
        .folder-tabs { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0 12px; -webkit-overflow-scrolling: touch; }
        .folder-tabs::-webkit-scrollbar { display: none; }
        .tab-btn { padding: 7px 16px; border-radius: 16px; border: none; background: var(--card2); color: var(--subtext); font-weight: 600; font-size: 13px; white-space: nowrap; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { background: var(--primary); color: #fff; }

        /* プレイリスト */
        #playlist { list-style: none; }
        .track { background: var(--card); border-bottom: 0.5px solid var(--border); padding: 14px 16px; display: flex; align-items: center; gap: 12px; transition: background 0.15s; }
        .track:active { background: var(--card2); }
        .track.active { background: rgba(10,132,255,0.12); }
        .track-index { width: 24px; font-size: 12px; color: var(--subtext); text-align: center; flex-shrink: 0; }
        .track.active .track-index { color: var(--primary); }
        .track-info { flex: 1; overflow: hidden; }
        .track-name { font-size: 15px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .track.active .track-name { color: var(--primary); font-weight: 600; }
        .track-folder { font-size: 11px; color: var(--subtext); margin-top: 2px; }
        .track-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .action-btn { background: var(--card2); border: none; color: var(--subtext); font-size: 13px; padding: 5px 10px; border-radius: 10px; cursor: pointer; }
        .action-btn.danger { color: var(--danger); }
        .action-btn:active { opacity: 0.7; }

        /* 編集モード */
        .edit-mode .track-actions { display: flex; }
        .track-actions { display: none; }
        .edit-toggle { background: none; border: none; color: var(--primary); font-size: 13px; font-weight: 600; cursor: pointer; padding: 4px 8px; }

        /* ステータス */
        #status { text-align: center; padding: 40px 20px; font-size: 14px; color: var(--subtext); }

        /* プレイヤーバー */
        .player-bar { position: fixed; bottom: 0; width: 100%; background: rgba(28,28,30,0.96); border-top: 0.5px solid var(--border); padding: 12px 20px calc(12px + env(safe-area-inset-bottom)); backdrop-filter: blur(30px); }
        .now-playing { font-size: 14px; font-weight: 600; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 8px; color: var(--text); }
        .now-folder { font-size: 11px; color: var(--subtext); text-align: center; margin-bottom: 8px; }
        audio { width: 100%; height: 36px; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 24px; margin-top: 10px; }
        .ctrl-btn { background: none; border: none; color: var(--text); font-size: 26px; cursor: pointer; padding: 4px; line-height: 1; }
        .ctrl-btn:active { opacity: 0.6; }
        .repeat-btn { font-size: 20px; color: var(--subtext); }
        .repeat-btn.on { color: var(--primary); }

        /* モーダル */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: flex-end; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--card); border-radius: 20px 20px 0 0; padding: 20px; width: 100%; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
        .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; text-align: center; }
        .modal input { width: 100%; background: var(--card2); border: none; color: var(--text); font-size: 16px; padding: 12px 16px; border-radius: 12px; outline: none; margin-bottom: 12px; }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btn { flex: 1; padding: 13px; border-radius: 14px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; }
        .modal-btn.cancel { background: var(--card2); color: var(--text); }
        .modal-btn.confirm { background: var(--primary); color: #fff; }
    </style>
</head>
<body>
<div class="header">
    <div class="header-top">
        <span class="header-title">Music</span>
        <div style="display:flex;gap:8px;align-items:center;">
            <button class="shuffle-btn" id="shuffleBtn" onclick="toggleShuffle()">🔀 シャッフル</button>
            <button class="edit-toggle" id="editToggle" onclick="toggleEdit()">編集</button>
        </div>
    </div>
    <div class="folder-tabs" id="folderTabs"></div>
</div>

<div id="status">読み込み中...</div>
<ul id="playlist"></ul>

<div class="player-bar">
    <div id="nowPlaying" class="now-playing">曲を選択してください</div>
    <div id="nowFolder" class="now-folder"></div>
    <audio id="audioPlayer" controls playsinline></audio>
    <div class="controls">
        <button class="ctrl-btn repeat-btn" id="repeatBtn" onclick="toggleRepeat()">🔁</button>
        <button class="ctrl-btn" onclick="playPrev()">⏮</button>
        <button class="ctrl-btn" onclick="playNext()">⏭</button>
    </div>
</div>

<!-- 曲名編集モーダル -->
<div class="modal-overlay" id="renameModal">
    <div class="modal">
        <h3>曲名を変更</h3>
        <input type="text" id="renameInput" placeholder="新しい曲名">
        <div class="modal-btns">
            <button class="modal-btn cancel" onclick="closeModal()">キャンセル</button>
            <button class="modal-btn confirm" onclick="confirmRename()">変更</button>
        </div>
    </div>
</div>

<script>
const API_KEY = 'AIzaSyDZeucbLPRw8d6RXCL7UHbfF6URuVLq11k';

const FOLDERS = [
    { name: 'AA曲', id: '1Wpuk92-2jC1AeCUv173zxgYFbYNoRPRb' },
    { name: 'EDM系', id: '1RXl5Pf_UmCyRRF0NHCGOSpjndbQy5-Z1' },
    { name: 'GReeeeN', id: '153zo7A3vtpwIbN6QJIoAGcbjuwQ7QD_h' },
    { name: 'RYOMA', id: '13jhP3vioRXfXaB2dyzUYAsaUpomYUJYN' },
    { name: 'X Japan', id: '1oOznEQPA4fRtFQCRUDUlNcg0fRfaZptS' },
    { name: 'クラシック系', id: '1__aV7_43861pWdQMvxubeQRS80ado8Du' },
    { name: 'サウンドトラック', id: '1wHYm35ZbnswG_5ctImMIudZ_CLM0zpMB' },
    { name: 'ショート系', id: '1sXGKaIg02iQ2iM_6w4swWSQkqFcXXvCi' },
    { name: '中国', id: '1KIVShKq2gbQURbzHH5WkoFldCxl48KhM' },
    { name: '邦楽', id: '1DO7GyUHSau_j8mfDcTV4NPYcp5amV5UQ' },
    { name: '未分類', id: '1iDq2uo1hOPy-1wllTW6O-c55HBl_RCJt' },
    { name: '洋楽', id: '19c7H2FygniKINzlkLtj1iPxohSGP86s9' }
];

const player = document.getElementById('audioPlayer');
const playlistEl = document.getElementById('playlist');
const folderTabsEl = document.getElementById('folderTabs');
const nowPlayingEl = document.getElementById('nowPlaying');
const nowFolderEl = document.getElementById('nowFolder');
const repeatBtn = document.getElementById('repeatBtn');
const shuffleBtn = document.getElementById('shuffleBtn');

let currentTracks = [];
let allTracks = [];
let currentTrackIndex = 0;
let repeatMode = 0;
let isShuffleMode = false;
let isEditMode = false;
let renameTargetIndex = -1;
let currentFolderId = null;

function stripExt(name) {
    return name.replace(/\.[^/.]+$/, '');
}

function init() {
    FOLDERS.forEach((folder) => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn';
        btn.innerText = folder.name;
        btn.onclick = () => switchFolder(folder.id, btn);
        folderTabsEl.appendChild(btn);
    });
    const lastId = localStorage.getItem('lastFolderId') || FOLDERS[0].id;
    const targetBtn = Array.from(folderTabsEl.children).find((b, i) => FOLDERS[i].id === lastId) || folderTabsEl.firstChild;
    switchFolder(lastId, targetBtn);
}

async function switchFolder(folderId, btnElement) {
    if (isShuffleMode) return;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btnElement.classList.add('active');
    localStorage.setItem('lastFolderId', folderId);
    currentFolderId = folderId;
    document.getElementById('status').innerText = '読み込み中...';
    playlistEl.innerHTML = '';
    const url = 'https://www.googleapis.com/drive/v3/files?q=%27' + folderId + '%27+in+parents+and+mimeType+contains+%27audio%27&key=' + API_KEY + '&fields=files(id,name)&orderBy=name';
    try {
        const response = await fetch(url);
        const data = await response.json();
        currentTracks = (data.files || []).map(f => ({ ...f, displayName: stripExt(f.name), folderName: FOLDERS.find(fl => fl.id === folderId)?.name || '' }));
        renderPlaylist();
    } catch (e) {
        document.getElementById('status').innerText = 'エラーが発生しました。';
    }
}

async function toggleShuffle() {
    isShuffleMode = !isShuffleMode;
    shuffleBtn.classList.toggle('active', isShuffleMode);
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    if (isShuffleMode) {
        document.getElementById('status').innerText = '全フォルダ読み込み中...';
        playlistEl.innerHTML = '';
        const promises = FOLDERS.map(folder =>
            fetch('https://www.googleapis.com/drive/v3/files?q=%27' + folder.id + '%27+in+parents+and+mimeType+contains+%27audio%27&key=' + API_KEY + '&fields=files(id,name)&orderBy=name')
            .then(r => r.json())
            .then(data => (data.files || []).map(f => ({ ...f, displayName: stripExt(f.name), folderName: folder.name })))
        );
        const results = await Promise.all(promises);
        allTracks = results.flat().sort(() => Math.random() - 0.5);
        currentTracks = allTracks;
        renderPlaylist();
    } else {
        const lastId = localStorage.getItem('lastFolderId') || FOLDERS[0].id;
        const targetBtn = Array.from(folderTabsEl.children).find((b, i) => FOLDERS[i].id === lastId) || folderTabsEl.firstChild;
        switchFolder(lastId, targetBtn);
    }
}

function renderPlaylist() {
    playlistEl.innerHTML = '';
    if (currentTracks.length === 0) {
        document.getElementById('status').innerText = '曲が見つかりません。';
        return;
    }
    document.getElementById('status').innerText = '';
    currentTracks.forEach((track, index) => {
        const li = document.createElement('li');
        li.className = 'track' + (index === currentTrackIndex ? ' active' : '');
        li.innerHTML =
            '<span class="track-index">' + (index + 1) + '</span>' +
            '<div class="track-info" onclick="playTrack(' + index + ')">' +
                '<div class="track-name">' + track.displayName + '</div>' +
                (isShuffleMode ? '<div class="track-folder">' + track.folderName + '</div>' : '') +
            '</div>' +
            '<div class="track-actions">' +
                '<button class="action-btn" onclick="moveUp(' + index + ')">↑</button>' +
                '<button class="action-btn" onclick="moveDown(' + index + ')">↓</button>' +
                '<button class="action-btn" onclick="openRename(' + index + ')">✏️</button>' +
                '<button class="action-btn danger" onclick="deleteTrack(' + index + ')">🗑</button>' +
            '</div>';
        playlistEl.appendChild(li);
    });
    if (isEditMode) playlistEl.classList.add('edit-mode');
}

function playTrack(index) {
    if (index < 0 || index >= currentTracks.length) return;
    currentTrackIndex = index;
    const track = currentTracks[index];
    player.src = 'https://www.googleapis.com/drive/v3/files/' + track.id + '?alt=media&key=' + API_KEY;
    player.play();
    nowPlayingEl.innerText = track.displayName;
    nowFolderEl.innerText = track.folderName;
    document.querySelectorAll('.track').forEach((el, i) => el.classList.toggle('active', i === index));
}

function playNext() {
    if (!currentTracks.length) return;
    playTrack(currentTrackIndex + 1 < currentTracks.length ? currentTrackIndex + 1 : 0);
}

function playPrev() {
    if (!currentTracks.length) return;
    playTrack(currentTrackIndex - 1 >= 0 ? currentTrackIndex - 1 : currentTracks.length - 1);
}

function toggleRepeat() {
    repeatMode = (repeatMode + 1) % 3;
    repeatBtn.textContent = repeatMode === 1 ? '🔂' : '🔁';
    repeatBtn.className = 'ctrl-btn repeat-btn' + (repeatMode > 0 ? ' on' : '');
}

player.onended = () => {
    if (repeatMode === 1) player.play();
    else playNext();
};

function toggleEdit() {
    isEditMode = !isEditMode;
    document.getElementById('editToggle').innerText = isEditMode ? '完了' : '編集';
    playlistEl.classList.toggle('edit-mode', isEditMode);
}

function moveUp(index) {
    if (index === 0) return;
    [currentTracks[index - 1], currentTracks[index]] = [currentTracks[index], currentTracks[index - 1]];
    if (currentTrackIndex === index) currentTrackIndex--;
    else if (currentTrackIndex === index - 1) currentTrackIndex++;
    renderPlaylist();
    if (isEditMode) playlistEl.classList.add('edit-mode');
}

function moveDown(index) {
    if (index === currentTracks.length - 1) return;
    [currentTracks[index], currentTracks[index + 1]] = [currentTracks[index + 1], currentTracks[index]];
    if (currentTrackIndex === index) currentTrackIndex++;
    else if (currentTrackIndex === index + 1) currentTrackIndex--;
    renderPlaylist();
    if (isEditMode) playlistEl.classList.add('edit-mode');
}

function deleteTrack(index) {
    currentTracks.splice(index, 1);
    if (currentTrackIndex >= currentTracks.length) currentTrackIndex = currentTracks.length - 1;
    renderPlaylist();
    if (isEditMode) playlistEl.classList.add('edit-mode');
}

function openRename(index) {
    renameTargetIndex = index;
    document.getElementById('renameInput').value = currentTracks[index].displayName;
    document.getElementById('renameModal').classList.add('show');
}

function closeModal() {
    document.getElementById('renameModal').classList.remove('show');
}

function confirmRename() {
    if (renameTargetIndex >= 0) {
        currentTracks[renameTargetIndex].displayName = document.getElementById('renameInput').value;
        renderPlaylist();
        if (isEditMode) playlistEl.classList.add('edit-mode');
        if (currentTrackIndex === renameTargetIndex) nowPlayingEl.innerText = currentTracks[renameTargetIndex].displayName;
    }
    closeModal();
}

init();
</script>
</body>
</html>
