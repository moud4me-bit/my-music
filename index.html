<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Music</title>
    <link rel="apple-touch-icon" href="icon.png?v=1">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #0a84ff;
            --primary-dark: #0066cc;
            --bg: #080810;
            --card: #12121a;
            --card2: #1e1e2a;
            --card3: #2a2a38;
            --text: #ffffff;
            --subtext: #8888aa;
            --border: #2a2a3a;
            --danger: #ff453a;
            --green: #30d158;
        }
        body {
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding-bottom: 240px;
            user-select: none;
            min-height: 100vh;
            background-image: radial-gradient(ellipse at top, #1a1a3a 0%, #080810 60%);
            background-attachment: fixed;
        }

        /* ヘッダー */
        .header {
            background: rgba(8,8,16,0.85);
            padding: env(safe-area-inset-top) 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-bottom: 0.5px solid var(--border);
        }
        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0 12px;
        }
        .header-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #8888aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-actions { display: flex; gap: 8px; align-items: center; }
        .icon-btn {
            background: var(--card2);
            border: 0.5px solid var(--border);
            color: var(--text);
            font-size: 16px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .icon-btn:active { transform: scale(0.92); }
        .icon-btn.active { background: var(--primary); border-color: var(--primary); }
        .edit-toggle {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            padding: 6px 10px;
        }

        /* フォルダタブ */
        .folder-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 10px 0 14px;
            -webkit-overflow-scrolling: touch;
        }
        .folder-tabs::-webkit-scrollbar { display: none; }
        .tab-btn {
            padding: 8px 18px;
            border-radius: 20px;
            border: 0.5px solid var(--border);
            background: var(--card2);
            color: var(--subtext);
            font-weight: 600;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: -0.2px;
        }
        .tab-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
            box-shadow: 0 4px 15px rgba(10,132,255,0.35);
        }
        .tab-btn .move-arrows { display: none; margin-left: 6px; font-size: 11px; }
        .folder-edit-mode .tab-btn .move-arrows { display: inline; }

        /* プレイリスト */
        #playlist { list-style: none; padding: 8px 0; }
        .track {
            margin: 4px 12px;
            border-radius: 14px;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .track:active { transform: scale(0.98); background: var(--card2); }
        .track.active {
            background: linear-gradient(135deg, rgba(10,132,255,0.2), rgba(10,132,255,0.08));
            border: 0.5px solid rgba(10,132,255,0.3);
        }
        .track-thumb {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--card3), var(--card2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            border: 0.5px solid var(--border);
        }
        .track.active .track-thumb {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            border-color: var(--primary);
        }
        .track-info { flex: 1; overflow: hidden; }
        .track-name {
            font-size: 15px;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text);
        }
        .track.active .track-name { color: #fff; font-weight: 600; }
        .track-folder {
            font-size: 11px;
            color: var(--subtext);
            margin-top: 3px;
        }
        .track-actions { display: none; gap: 4px; flex-shrink: 0; }
        .action-btn {
            background: var(--card3);
            border: none;
            color: var(--subtext);
            font-size: 12px;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .action-btn:active { opacity: 0.7; transform: scale(0.95); }
        .action-btn.danger { color: var(--danger); }
        .edit-mode .track-actions { display: flex; }

        #status { text-align: center; padding: 60px 20px; font-size: 14px; color: var(--subtext); }

        /* プレイヤーバー */
        .player-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(18,18,26,0.95);
            border-top: 0.5px solid var(--border);
            padding: 14px 20px calc(14px + env(safe-area-inset-bottom));
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
        }
        .player-inner {
            max-width: 480px;
            margin: 0 auto;
        }
        .now-playing-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .player-thumb {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .player-thumb.idle {
            background: var(--card3);
        }
        .player-text { flex: 1; overflow: hidden; }
        .now-playing {
            font-size: 14px;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .now-folder { font-size: 11px; color: var(--subtext); margin-top: 2px; }
        audio { width: 100%; height: 32px; margin-bottom: 8px; }
        audio::-webkit-media-controls-panel { background: var(--card2); }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 28px;
        }
        .ctrl-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 28px;
            cursor: pointer;
            padding: 4px;
            line-height: 1;
            transition: all 0.15s;
        }
        .ctrl-btn:active { opacity: 0.5; transform: scale(0.9); }
        .repeat-btn { font-size: 20px; color: var(--subtext); }
        .repeat-btn.on { color: var(--primary); filter: drop-shadow(0 0 6px rgba(10,132,255,0.5)); }

        /* モーダル */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 200;
            align-items: flex-end;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--card);
            border-radius: 24px 24px 0 0;
            padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
            width: 100%;
            border-top: 0.5px solid var(--border);
        }
        .modal-handle {
            width: 36px;
            height: 4px;
            background: var(--card3);
            border-radius: 2px;
            margin: 0 auto 20px;
        }
        .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 16px; text-align: center; }
        .modal input {
            width: 100%;
            background: var(--card2);
            border: 0.5px solid var(--border);
            color: var(--text);
            font-size: 16px;
            padding: 14px 16px;
            border-radius: 14px;
            outline: none;
            margin-bottom: 14px;
        }
        .modal input:focus { border-color: var(--primary); }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btn {
            flex: 1;
            padding: 14px;
            border-radius: 14px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        .modal-btn:active { transform: scale(0.97); }
        .modal-btn.cancel { background: var(--card2); color: var(--text); }
        .modal-btn.confirm { background: var(--primary); color: #fff; box-shadow: 0 4px 15px rgba(10,132,255,0.35); }
    </style>
</head>
<body>
<div class="header">
    <div class="header-top">
        <span class="header-title">Music</span>
        <div class="header-actions">
            <button class="icon-btn" id="shuffleBtn" onclick="toggleShuffle()" title="シャッフル">🔀</button>
            <button class="icon-btn" id="folderEditBtn" onclick="toggleFolderEdit()" title="フォルダ並び替え">☰</button>
            <button class="edit-toggle" id="editToggle" onclick="toggleEdit()">編集</button>
        </div>
    </div>
    <div class="folder-tabs" id="folderTabs"></div>
</div>

<div id="status">読み込み中...</div>
<ul id="playlist"></ul>

<div class="player-bar">
    <div class="player-inner">
        <div class="now-playing-wrap">
            <div class="player-thumb idle" id="playerThumb">🎵</div>
            <div class="player-text">
                <div id="nowPlaying" class="now-playing">曲を選択してください</div>
                <div id="nowFolder" class="now-folder"></div>
            </div>
        </div>
        <audio id="audioPlayer" controls playsinline></audio>
        <div class="controls">
            <button class="ctrl-btn repeat-btn" id="repeatBtn" onclick="toggleRepeat()">🔁</button>
            <button class="ctrl-btn" onclick="playPrev()">⏮</button>
            <button class="ctrl-btn" onclick="playNext()">⏭</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="renameModal">
    <div class="modal">
        <div class="modal-handle"></div>
        <h3>曲名を変更</h3>
        <input type="text" id="renameInput" placeholder="新しい曲名">
        <div class="modal-btns">
            <button class="modal-btn cancel" onclick="closeModal()">キャンセル</button>
            <button class="modal-btn confirm" onclick="confirmRename()">変更</button>
        </div>
    </div>
</div>

<script>
const API_KEY = 'AIzaSyDZeucbLPRw8d6RXCL7UHbfF6URuVLq11k';

let FOLDERS = [
    { name: 'AA曲', id: '1Wpuk92-2jC1AeCUv173zxgYFbYNoRPRb' },
    { name: 'EDM系', id: '1RXl5Pf_UmCyRRF0NHCGOSpjndbQy5-Z1' },
    { name: 'GReeeeN', id: '153zo7A3vtpwIbN6QJIoAGcbjuwQ7QD_h' },
    { name: 'RYOMA', id: '13jhP3vioRXfXaB2dyzUYAsaUpomYUJYN' },
    { name: 'X Japan', id: '1oOznEQPA4fRtFQCRUDUlNcg0fRfaZptS' },
    { name: 'クラシック系', id: '1__aV7_43861pWdQMvxubeQRS80ado8Du' },
    { name: 'サウンドトラック', id: '1wHYm35ZbnswG_5ctImMIudZ_CLM0zpMB' },
    { name: 'ショート系', id: '1sXGKaIg02iQ2iM_6w4swWSQkqFcXXvCi' },
    { name: '中国', id: '1KIVShKq2gbQURbzHH5WkoFldCxl48KhM' },
    { name: '邦楽', id: '1DO7GyUHSau_j8mfDcTV4NPYcp5amV5UQ' },
    { name: '未分類', id: '1iDq2uo1hOPy-1wllTW6O-c55HBl_RCJt' },
    { name: '洋楽', id: '19c7H2FygniKINzlkLtj1iPxohSGP86s9' }
];

const EMOJIS = ['🎵','🎶','🎸','🎹','🥁','🎺','🎻','🎤','🎧','🎼'];

const player = document.getElementById('audioPlayer');
const playlistEl = document.getElementById('playlist');
const folderTabsEl = document.getElementById('folderTabs');
const nowPlayingEl = document.getElementById('nowPlaying');
const nowFolderEl = document.getElementById('nowFolder');
const repeatBtn = document.getElementById('repeatBtn');
const shuffleBtn = document.getElementById('shuffleBtn');
const playerThumb = document.getElementById('playerThumb');

let currentTracks = [];
let currentTrackIndex = 0;
let repeatMode = 0;
let isShuffleMode = false;
let isEditMode = false;
let isFolderEditMode = false;
let renameTargetIndex = -1;
let currentFolderId = null;

// フォルダ順をlocalStorageに保存・復元
function saveFolderOrder() {
    localStorage.setItem('folderOrder', JSON.stringify(FOLDERS.map(f => f.id)));
}
function loadFolderOrder() {
    const saved = localStorage.getItem('folderOrder');
    if (!saved) return;
    const order = JSON.parse(saved);
    FOLDERS.sort((a, b) => order.indexOf(a.id) - order.indexOf(b.id));
}

function stripExt(name) { return name.replace(/\.[^/.]+$/, ''); }
function getEmoji(name) { return EMOJIS[name.charCodeAt(0) % EMOJIS.length]; }

function init() {
    loadFolderOrder();
    renderFolderTabs();
    const lastId = localStorage.getItem('lastFolderId') || FOLDERS[0].id;
    const targetBtn = Array.from(folderTabsEl.children).find((b, i) => FOLDERS[i]?.id === lastId) || folderTabsEl.firstChild;
    if (targetBtn) switchFolder(lastId, targetBtn);
}

function renderFolderTabs() {
    folderTabsEl.innerHTML = '';
    FOLDERS.forEach((folder, index) => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (folder.id === currentFolderId ? ' active' : '');
        btn.innerHTML = folder.name +
            '<span class="move-arrows">' +
            '<span onclick="event.stopPropagation();moveFolderLeft(' + index + ')">◀</span>' +
            '<span onclick="event.stopPropagation();moveFolderRight(' + index + ')">▶</span>' +
            '</span>';
        btn.onclick = () => { if (!isFolderEditMode) switchFolder(folder.id, btn); };
        folderTabsEl.appendChild(btn);
    });
    if (isFolderEditMode) folderTabsEl.classList.add('folder-edit-mode');
    else folderTabsEl.classList.remove('folder-edit-mode');
}

function toggleFolderEdit() {
    isFolderEditMode = !isFolderEditMode;
    document.getElementById('folderEditBtn').classList.toggle('active', isFolderEditMode);
    renderFolderTabs();
}

function moveFolderLeft(index) {
    if (index === 0) return;
    [FOLDERS[index - 1], FOLDERS[index]] = [FOLDERS[index], FOLDERS[index - 1]];
    saveFolderOrder();
    renderFolderTabs();
}

function moveFolderRight(index) {
    if (index === FOLDERS.length - 1) return;
    [FOLDERS[index], FOLDERS[index + 1]] = [FOLDERS[index + 1], FOLDERS[index]];
    saveFolderOrder();
    renderFolderTabs();
}

async function switchFolder(folderId, btnElement) {
    if (isShuffleMode) return;
    currentFolderId = folderId;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    if (btnElement) btnElement.classList.add('active');
    localStorage.setItem('lastFolderId', folderId);
    document.getElementById('status').innerText = '読み込み中...';
    playlistEl.innerHTML = '';
    const url = 'https://www.googleapis.com/drive/v3/files?q=%27' + folderId + '%27+in+parents+and+mimeType+contains+%27audio%27&key=' + API_KEY + '&fields=files(id,name)&orderBy=name';
    try {
        const response = await fetch(url);
        const data = await response.json();
        currentTracks = (data.files || []).map(f => ({ ...f, displayName: stripExt(f.name), folderName: FOLDERS.find(fl => fl.id === folderId)?.name || '' }));
        renderPlaylist();
    } catch (e) {
        document.getElementById('status').innerText = 'エラーが発生しました。';
    }
}

async function toggleShuffle() {
    isShuffleMode = !isShuffleMode;
    shuffleBtn.classList.toggle('active', isShuffleMode);
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    if (isShuffleMode) {
        document.getElementById('status').innerText = '全フォルダ読み込み中...';
        playlistEl.innerHTML = '';
        const promises = FOLDERS.map(folder =>
            fetch('https://www.googleapis.com/drive/v3/files?q=%27' + folder.id + '%27+in+parents+and+mimeType+contains+%27audio%27&key=' + API_KEY + '&fields=files(id,name)&orderBy=name')
            .then(r => r.json())
            .then(data => (data.files || []).map(f => ({ ...f, displayName: stripExt(f.name), folderName: folder.name })))
        );
        const results = await Promise.all(promises);
        currentTracks = results.flat().sort(() => Math.random() - 0.5);
        renderPlaylist();
    } else {
        const lastId = localStorage.getItem('lastFolderId') || FOLDERS[0].id;
        const targetBtn = Array.from(folderTabsEl.children).find((b, i) => FOLDERS[i]?.id === lastId) || folderTabsEl.firstChild;
        switchFolder(lastId, targetBtn);
    }
}

function renderPlaylist() {
    playlistEl.innerHTML = '';
    if (currentTracks.length === 0) {
        document.getElementById('status').innerText = '曲が見つかりません。';
        return;
    }
    document.getElementById('status').innerText = '';
    currentTracks.forEach((track, index) => {
        const li = document.createElement('li');
        li.className = 'track' + (index === currentTrackIndex ? ' active' : '');
        const emoji = getEmoji(track.displayName);
        li.innerHTML =
            '<div class="track-thumb">' + emoji + '</div>' +
            '<div class="track-info" onclick="playTrack(' + index + ')">' +
                '<div class="track-name">' + track.displayName + '</div>' +
                (isShuffleMode ? '<div class="track-folder">' + track.folderName + '</div>' : '') +
            '</div>' +
            '<div class="track-actions">' +
                '<button class="action-btn" onclick="moveUp(' + index + ')">↑</button>' +
                '<button class="action-btn" onclick="moveDown(' + index + ')">↓</button>' +
                '<button class="action-btn" onclick="openRename(' + index + ')">✏️</button>' +
                '<button class="action-btn danger" onclick="deleteTrack(' + index + ')">🗑</button>' +
            '</div>';
        playlistEl.appendChild(li);
    });
    if (isEditMode) playlistEl.classList.add('edit-mode');
}

function playTrack(index) {
    if (index < 0 || index >= currentTracks.length) return;
    currentTrackIndex = index;
    const track = currentTracks[index];
    player.src = 'https://www.googleapis.com/drive/v3/files/' + track.id + '?alt=media&key=' + API_KEY;
    player.play();
    nowPlayingEl.innerText = track.displayName;
    nowFolderEl.innerText = track.folderName;
    playerThumb.textContent = getEmoji(track.displayName);
    playerThumb.classList.remove('idle');
    document.querySelectorAll('.track').forEach((el, i) => el.classList.toggle('active', i === index));
}

function playNext() {
    if (!currentTracks.length) return;
    playTrack(currentTrackIndex + 1 < currentTracks.length ? currentTrackIndex + 1 : 0);
}

function playPrev() {
    if (!currentTracks.length) return;
    playTrack(currentTrackIndex - 1 >= 0 ? currentTrackIndex - 1 : currentTracks.length - 1);
}

function toggleRepeat() {
    repeatMode = (repeatMode + 1) % 3;
    repeatBtn.textContent = repeatMode === 1 ? '🔂' : '🔁';
    repeatBtn.className = 'ctrl-btn repeat-btn' + (repeatMode > 0 ? ' on' : '');
}

player.onended = () => {
    if (repeatMode === 1) player.play();
    else playNext();
};

function toggleEdit() {
    isEditMode = !isEditMode;
    document.getElementById('editToggle').innerText = isEditMode ? '完了' : '編集';
    playlistEl.classList.toggle('edit-mode', isEditMode);
}

function moveUp(index) {
    if (index === 0) return;
    [currentTracks[index - 1], currentTracks[index]] = [currentTracks[index], currentTracks[index - 1]];
    if (currentTrackIndex === index) currentTrackIndex--;
    else if (currentTrackIndex === index - 1) currentTrackIndex++;
    renderPlaylist();
    if (isEditMode) playlistEl.classList.add('edit-mode');
}

function moveDown(index) {
    if (index === currentTracks.length - 1) return;
    [currentTracks[index], currentTracks[index + 1]] = [currentTracks[index + 1], currentTracks[index]];
    if (currentTrackIndex === index) currentTrackIndex++;
    else if (currentTrackIndex === index + 1) currentTrackIndex--;
    renderPlaylist();
    if (isEditMode) playlistEl.classList.add('edit-mode');
}

function deleteTrack(index) {
    currentTracks.splice(index, 1);
    if (currentTrackIndex >= currentTracks.length) currentTrackIndex = currentTracks.length - 1;
    renderPlaylist();
    if (isEditMode) playlistEl.classList.add('edit-mode');
}

function openRename(index) {
    renameTargetIndex = index;
    document.getElementById('renameInput').value = currentTracks[index].displayName;
    document.getElementById('renameModal').classList.add('show');
}

function closeModal() { document.getElementById('renameModal').classList.remove('show'); }

function confirmRename() {
    if (renameTargetIndex >= 0) {
        currentTracks[renameTargetIndex].displayName = document.getElementById('renameInput').value;
        renderPlaylist();
        if (isEditMode) playlistEl.classList.add('edit-mode');
        if (currentTrackIndex === renameTargetIndex) nowPlayingEl.innerText = currentTracks[renameTargetIndex].displayName;
    }
    closeModal();
}

init();
</script>
</body>
</html>
