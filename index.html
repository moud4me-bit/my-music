<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Music</title>
    <link rel="apple-touch-icon" href="icon.png?v=1">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        :root {
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --gold-dim: rgba(201,168,76,0.15);
            --bg: #0a0905;
            --surface: #111009;
            --surface2: #1a180f;
            --surface3: #242218;
            --text: #f0e8d0;
            --text-dim: #6b6450;
            --text-mid: #9e9278;
            --border: rgba(201,168,76,0.12);
            --danger: #c0392b;
            --radius: 12px;
        }

        body {
            font-family: 'DM Mono', monospace;
            background: var(--bg);
            color: var(--text);
            padding-bottom: 260px;
            user-select: none;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Noise texture overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.4;
        }

        /* ── HEADER ── */
        .header {
            padding: env(safe-area-inset-top) 0 0;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10,9,5,0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
        }

        .header-inner {
            padding: 14px 20px 0;
        }

        .header-top {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .logo-wrap { display: flex; flex-direction: column; gap: 2px; }

        .logo {
            font-family: 'DM Serif Display', serif;
            font-size: 32px;
            font-weight: 400;
            color: var(--text);
            letter-spacing: -0.5px;
            line-height: 1;
        }

        .logo span {
            font-style: italic;
            color: var(--gold);
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hbtn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-mid);
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.1em;
            padding: 7px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .hbtn:active { transform: scale(0.95); }
        .hbtn.on {
            background: var(--gold-dim);
            border-color: var(--gold);
            color: var(--gold-light);
        }
        .hbtn.danger-btn { color: var(--text-dim); }

        /* ── FOLDER TABS ── */
        .tabs-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding: 0 20px 14px;
            margin-top: 4px;
        }
        .tabs-wrap::-webkit-scrollbar { display: none; }

        .tabs {
            display: flex;
            gap: 6px;
            width: max-content;
        }

        .tab {
            padding: 7px 16px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-mid);
            font-family: 'DM Serif Display', serif;
            font-size: 14px;
            letter-spacing: 0.01em;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tab:active { transform: scale(0.96); }
        .tab.active {
            background: var(--gold-dim);
            border-color: var(--gold);
            color: var(--gold-light);
        }

        .tab-arrows {
            display: none;
            gap: 3px;
        }
        .tab-arrow {
            background: var(--surface3);
            border: none;
            color: var(--text-dim);
            font-size: 10px;
            width: 18px;
            height: 18px;
            border-radius: 3px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .tab-arrow:active { background: var(--gold-dim); color: var(--gold); }
        .folder-edit-mode .tab-arrows { display: flex; }

        /* ── TRACK LIST ── */
        #status {
            text-align: center;
            padding: 60px 20px;
            font-family: 'DM Serif Display', serif;
            font-size: 16px;
            font-style: italic;
            color: var(--text-dim);
        }

        #playlist { list-style: none; padding: 6px 0; }

        .track {
            display: flex;
            align-items: center;
            padding: 11px 20px;
            gap: 14px;
            border-bottom: 1px solid rgba(201,168,76,0.05);
            transition: all 0.18s;
            cursor: pointer;
            position: relative;
        }
        .track:active { background: rgba(201,168,76,0.04); }

        .track.active {
            background: linear-gradient(90deg, rgba(201,168,76,0.08) 0%, transparent 100%);
        }
        .track.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--gold);
            border-radius: 0 2px 2px 0;
        }

        .track-num {
            font-size: 10px;
            color: var(--text-dim);
            width: 22px;
            text-align: right;
            flex-shrink: 0;
            font-feature-settings: 'tnum';
        }
        .track.active .track-num { color: var(--gold); }

        .track-disc {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, var(--surface3), var(--surface));
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }
        .track-disc::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--bg);
            border: 1px solid var(--border);
        }
        .track.active .track-disc {
            border-color: var(--gold);
            background: radial-gradient(circle at 30% 30%, #2a2410, #0a0905);
            animation: spin 4s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .track.active .track-disc::after { border-color: var(--gold); }

        .track-info { flex: 1; overflow: hidden; }
        .track-name {
            font-size: 13px;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text);
            letter-spacing: -0.01em;
        }
        .track.active .track-name { color: var(--gold-light); }

        .track-folder {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 2px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .track-actions {
            display: none;
            gap: 4px;
            flex-shrink: 0;
        }
        .act-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 11px;
            padding: 5px 8px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'DM Mono', monospace;
            transition: all 0.15s;
        }
        .act-btn:active { transform: scale(0.93); }
        .act-btn.del { color: var(--danger); border-color: rgba(192,57,43,0.25); }
        .edit-mode .track-actions { display: flex; }

        /* ── PLAYER BAR ── */
        .player-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(10,9,5,0.97);
            border-top: 1px solid var(--border);
            padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
        }

        .player-bar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            opacity: 0.4;
        }

        .now-playing-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .player-disc {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, var(--surface3), var(--surface));
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }
        .player-disc::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--bg);
            border: 1px solid var(--border);
        }
        .player-disc.playing {
            border-color: var(--gold);
            box-shadow: 0 0 16px rgba(201,168,76,0.25);
            animation: spin 3s linear infinite;
        }
        .player-disc.playing::after { border-color: var(--gold); }

        .player-info { flex: 1; overflow: hidden; }
        .player-title {
            font-family: 'DM Serif Display', serif;
            font-size: 15px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text);
        }
        .player-folder {
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 2px;
        }

        audio {
            width: 100%;
            height: 28px;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        audio::-webkit-media-controls-panel {
            background: var(--surface2);
        }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .ctrl {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-mid);
            cursor: pointer;
            width: 52px;
            height: 52px;
            font-size: 20px;
            line-height: 1;
            transition: all 0.18s;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ctrl:active { transform: scale(0.88); opacity: 0.7; }

        .ctrl-prev, .ctrl-next {
            width: 62px;
            height: 62px;
            font-size: 26px;
            background: var(--surface3);
            border-color: rgba(201,168,76,0.2);
            color: var(--text);
        }

        .ctrl-repeat {
            font-size: 18px;
            color: var(--text-dim);
        }
        .ctrl-repeat.on {
            background: var(--gold-dim);
            border-color: var(--gold);
            color: var(--gold-light);
            box-shadow: 0 0 12px rgba(201,168,76,0.2);
        }

        .ctrl-shuffle {
            font-size: 18px;
        }
        .ctrl-shuffle.on {
            background: var(--gold-dim);
            border-color: var(--gold);
            color: var(--gold-light);
            box-shadow: 0 0 12px rgba(201,168,76,0.2);
        }

        /* ── MODAL ── */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 300;
            align-items: flex-end;
        }
        .overlay.show { display: flex; }

        .sheet {
            background: var(--surface);
            border-radius: 18px 18px 0 0;
            border: 1px solid var(--border);
            border-bottom: none;
            padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
            width: 100%;
        }

        .sheet-handle {
            width: 32px;
            height: 3px;
            background: var(--surface3);
            border-radius: 2px;
            margin: 0 auto 20px;
        }

        .sheet h3 {
            font-family: 'DM Serif Display', serif;
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 16px;
            text-align: center;
            color: var(--text);
        }

        .sheet input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 14px;
            padding: 13px 16px;
            border-radius: 8px;
            outline: none;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }
        .sheet input:focus { border-color: var(--gold); }

        .sheet-btns { display: flex; gap: 10px; }
        .sheet-btn {
            flex: 1;
            padding: 13px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.15s;
        }
        .sheet-btn:active { transform: scale(0.97); }
        .sheet-btn.cancel { background: var(--surface2); color: var(--text-mid); }
        .sheet-btn.confirm {
            background: var(--gold-dim);
            border-color: var(--gold);
            color: var(--gold-light);
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-inner">
        <div class="header-top">
            <div class="logo-wrap">
                <span class="logo">Mu<span>sic</span></span>
            </div>
            <div class="header-controls">
                <button class="hbtn" id="folderEditBtn" onclick="toggleFolderEdit()">並替</button>
                <button class="hbtn danger-btn" id="editToggle" onclick="toggleEdit()">編集</button>
            </div>
        </div>
    </div>
    <div class="tabs-wrap">
        <div class="tabs" id="folderTabs"></div>
    </div>
</div>

<div id="status">— 読み込み中 —</div>
<ul id="playlist"></ul>

<div class="player-bar">
    <div class="now-playing-row">
        <div class="player-disc" id="playerDisc"></div>
        <div class="player-info">
            <div class="player-title" id="nowPlaying">Select a track</div>
            <div class="player-folder" id="nowFolder"></div>
        </div>
    </div>
    <audio id="audioPlayer" controls playsinline></audio>
    <div class="controls-row">
        <button class="ctrl ctrl-repeat" id="repeatBtn" onclick="toggleRepeat()">🔁</button>
        <button class="ctrl ctrl-prev" onclick="playPrev()">⏮</button>
        <button class="ctrl ctrl-next" onclick="playNext()">⏭</button>
        <button class="ctrl ctrl-shuffle" id="shuffleBtn" onclick="toggleShuffle()">🔀</button>
    </div>
</div>

<div class="overlay" id="renameOverlay">
    <div class="sheet">
        <div class="sheet-handle"></div>
        <h3>Rename Track</h3>
        <input type="text" id="renameInput" placeholder="曲名を入力">
        <div class="sheet-btns">
            <button class="sheet-btn cancel" onclick="closeModal()">Cancel</button>
            <button class="sheet-btn confirm" onclick="confirmRename()">Rename</button>
        </div>
    </div>
</div>

<script>
const API_KEY = 'AIzaSyDZeucbLPRw8d6RXCL7UHbfF6URuVLq11k';

let FOLDERS = [
    { name: 'AA曲', id: '1Wpuk92-2jC1AeCUv173zxgYFbYNoRPRb' },
    { name: 'EDM系', id: '1RXl5Pf_UmCyRRF0NHCGOSpjndbQy5-Z1' },
    { name: 'GReeeeN', id: '153zo7A3vtpwIbN6QJIoAGcbjuwQ7QD_h' },
    { name: 'RYOMA', id: '13jhP3vioRXfXaB2dyzUYAsaUpomYUJYN' },
    { name: 'X Japan', id: '1oOznEQPA4fRtFQCRUDUlNcg0fRfaZptS' },
    { name: 'クラシック系', id: '1__aV7_43861pWdQMvxubeQRS80ado8Du' },
    { name: 'サウンドトラック', id: '1wHYm35ZbnswG_5ctImMIudZ_CLM0zpMB' },
    { name: 'ショート系', id: '1sXGKaIg02iQ2iM_6w4swWSQkqFcXXvCi' },
    { name: '中国', id: '1KIVShKq2gbQURbzHH5WkoFldCxl48KhM' },
    { name: '邦楽', id: '1DO7GyUHSau_j8mfDcTV4NPYcp5amV5UQ' },
    { name: '未分類', id: '1iDq2uo1hOPy-1wllTW6O-c55HBl_RCJt' },
    { name: '洋楽', id: '19c7H2FygniKINzlkLtj1iPxohSGP86s9' }
];

const player = document.getElementById('audioPlayer');
const playlistEl = document.getElementById('playlist');
const folderTabsEl = document.getElementById('folderTabs');
const nowPlayingEl = document.getElementById('nowPlaying');
const nowFolderEl = document.getElementById('nowFolder');
const repeatBtn = document.getElementById('repeatBtn');
const shuffleBtn = document.getElementById('shuffleBtn');
const playerDisc = document.getElementById('playerDisc');

let currentTracks = [], currentTrackIndex = 0;
let repeatMode = 0, isShuffleMode = false, isEditMode = false, isFolderEditMode = false;
let renameTargetIndex = -1, currentFolderId = null;

function stripExt(n) { return n.replace(/\.[^/.]+$/, ''); }

function saveFolderOrder() {
    localStorage.setItem('folderOrder', JSON.stringify(FOLDERS.map(f => f.id)));
}
function loadFolderOrder() {
    const s = localStorage.getItem('folderOrder');
    if (!s) return;
    const order = JSON.parse(s);
    FOLDERS.sort((a, b) => order.indexOf(a.id) - order.indexOf(b.id));
}

function init() {
    loadFolderOrder();
    renderTabs();
    const lastId = localStorage.getItem('lastFolderId') || FOLDERS[0].id;
    const btn = Array.from(folderTabsEl.children).find((b, i) => FOLDERS[i]?.id === lastId) || folderTabsEl.firstChild;
    if (btn) switchFolder(lastId, btn);
}

function renderTabs() {
    folderTabsEl.innerHTML = '';
    FOLDERS.forEach((folder, i) => {
        const btn = document.createElement('button');
        btn.className = 'tab' + (folder.id === currentFolderId ? ' active' : '');
        btn.innerHTML = folder.name +
            '<span class="tab-arrows">' +
            '<button class="tab-arrow" onclick="event.stopPropagation();moveFolderLeft(' + i + ')">◀</button>' +
            '<button class="tab-arrow" onclick="event.stopPropagation();moveFolderRight(' + i + ')">▶</button>' +
            '</span>';
        btn.onclick = () => { if (!isFolderEditMode) switchFolder(folder.id, btn); };
        folderTabsEl.appendChild(btn);
    });
    folderTabsEl.classList.toggle('folder-edit-mode', isFolderEditMode);
}

function toggleFolderEdit() {
    isFolderEditMode = !isFolderEditMode;
    document.getElementById('folderEditBtn').classList.toggle('on', isFolderEditMode);
    renderTabs();
}

function moveFolderLeft(i) {
    if (i === 0) return;
    [FOLDERS[i-1], FOLDERS[i]] = [FOLDERS[i], FOLDERS[i-1]];
    saveFolderOrder(); renderTabs();
}
function moveFolderRight(i) {
    if (i === FOLDERS.length - 1) return;
    [FOLDERS[i], FOLDERS[i+1]] = [FOLDERS[i+1], FOLDERS[i]];
    saveFolderOrder(); renderTabs();
}

async function switchFolder(folderId, btnEl) {
    if (isShuffleMode) return;
    currentFolderId = folderId;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    if (btnEl) btnEl.classList.add('active');
    localStorage.setItem('lastFolderId', folderId);
    document.getElementById('status').innerText = '— 読み込み中 —';
    playlistEl.innerHTML = '';
    try {
        const r = await fetch('https://www.googleapis.com/drive/v3/files?q=%27' + folderId + '%27+in+parents+and+mimeType+contains+%27audio%27&key=' + API_KEY + '&fields=files(id,name)&orderBy=name');
        const d = await r.json();
        currentTracks = (d.files || []).map(f => ({ ...f, displayName: stripExt(f.name), folderName: FOLDERS.find(fl => fl.id === folderId)?.name || '' }));
        renderPlaylist();
    } catch(e) {
        document.getElementById('status').innerText = '— エラー —';
    }
}

async function toggleShuffle() {
    isShuffleMode = !isShuffleMode;
    shuffleBtn.classList.toggle('on', isShuffleMode);
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    if (isShuffleMode) {
        document.getElementById('status').innerText = '— 全フォルダ読み込み中 —';
        playlistEl.innerHTML = '';
        const results = await Promise.all(FOLDERS.map(folder =>
            fetch('https://www.googleapis.com/drive/v3/files?q=%27' + folder.id + '%27+in+parents+and+mimeType+contains+%27audio%27&key=' + API_KEY + '&fields=files(id,name)&orderBy=name')
            .then(r => r.json())
            .then(d => (d.files || []).map(f => ({ ...f, displayName: stripExt(f.name), folderName: folder.name })))
        ));
        currentTracks = results.flat().sort(() => Math.random() - 0.5);
        renderPlaylist();
    } else {
        const lastId = localStorage.getItem('lastFolderId') || FOLDERS[0].id;
        const btn = Array.from(folderTabsEl.children).find((b, i) => FOLDERS[i]?.id === lastId) || folderTabsEl.firstChild;
        switchFolder(lastId, btn);
    }
}

function renderPlaylist() {
    playlistEl.innerHTML = '';
    if (!currentTracks.length) { document.getElementById('status').innerText = '— 曲が見つかりません —'; return; }
    document.getElementById('status').innerText = '';
    currentTracks.forEach((track, i) => {
        const li = document.createElement('li');
        li.className = 'track' + (i === currentTrackIndex ? ' active' : '');
        li.innerHTML =
            '<span class="track-num">' + String(i+1).padStart(2,'0') + '</span>' +
            '<div class="track-disc"></div>' +
            '<div class="track-info" onclick="playTrack(' + i + ')">' +
                '<div class="track-name">' + track.displayName + '</div>' +
                (isShuffleMode ? '<div class="track-folder">' + track.folderName + '</div>' : '') +
            '</div>' +
            '<div class="track-actions">' +
                '<button class="act-btn" onclick="moveUp(' + i + ')">↑</button>' +
                '<button class="act-btn" onclick="moveDown(' + i + ')">↓</button>' +
                '<button class="act-btn" onclick="openRename(' + i + ')">✎</button>' +
                '<button class="act-btn del" onclick="deleteTrack(' + i + ')">✕</button>' +
            '</div>';
        playlistEl.appendChild(li);
    });
    if (isEditMode) playlistEl.classList.add('edit-mode');
}

function playTrack(i) {
    if (i < 0 || i >= currentTracks.length) return;
    currentTrackIndex = i;
    const t = currentTracks[i];
    player.src = 'https://www.googleapis.com/drive/v3/files/' + t.id + '?alt=media&key=' + API_KEY;
    player.play();
    nowPlayingEl.innerText = t.displayName;
    nowFolderEl.innerText = t.folderName;
    playerDisc.classList.add('playing');
    document.querySelectorAll('.track').forEach((el, j) => el.classList.toggle('active', j === i));
}

function playNext() {
    if (!currentTracks.length) return;
    playTrack(currentTrackIndex + 1 < currentTracks.length ? currentTrackIndex + 1 : 0);
}
function playPrev() {
    if (!currentTracks.length) return;
    playTrack(currentTrackIndex - 1 >= 0 ? currentTrackIndex - 1 : currentTracks.length - 1);
}

function toggleRepeat() {
    repeatMode = (repeatMode + 1) % 3;
    repeatBtn.textContent = repeatMode === 1 ? '🔂' : '🔁';
    repeatBtn.className = 'ctrl ctrl-repeat' + (repeatMode > 0 ? ' on' : '');
}

player.onended = () => {
    if (repeatMode === 1) player.play();
    else playNext();
};

player.onpause = () => { if (player.ended) return; playerDisc.classList.remove('playing'); };
player.onplay = () => { if (currentTracks.length) playerDisc.classList.add('playing'); };

function toggleEdit() {
    isEditMode = !isEditMode;
    document.getElementById('editToggle').innerText = isEditMode ? '完了' : '編集';
    document.getElementById('editToggle').classList.toggle('on', isEditMode);
    playlistEl.classList.toggle('edit-mode', isEditMode);
}

function moveUp(i) {
    if (i === 0) return;
    [currentTracks[i-1], currentTracks[i]] = [currentTracks[i], currentTracks[i-1]];
    if (currentTrackIndex === i) currentTrackIndex--;
    else if (currentTrackIndex === i-1) currentTrackIndex++;
    renderPlaylist(); if (isEditMode) playlistEl.classList.add('edit-mode');
}
function moveDown(i) {
    if (i === currentTracks.length - 1) return;
    [currentTracks[i], currentTracks[i+1]] = [currentTracks[i+1], currentTracks[i]];
    if (currentTrackIndex === i) currentTrackIndex++;
    else if (currentTrackIndex === i+1) currentTrackIndex--;
    renderPlaylist(); if (isEditMode) playlistEl.classList.add('edit-mode');
}
function deleteTrack(i) {
    currentTracks.splice(i, 1);
    if (currentTrackIndex >= currentTracks.length) currentTrackIndex = currentTracks.length - 1;
    renderPlaylist(); if (isEditMode) playlistEl.classList.add('edit-mode');
}

function openRename(i) {
    renameTargetIndex = i;
    document.getElementById('renameInput').value = currentTracks[i].displayName;
    document.getElementById('renameOverlay').classList.add('show');
}
function closeModal() { document.getElementById('renameOverlay').classList.remove('show'); }
function confirmRename() {
    if (renameTargetIndex >= 0) {
        currentTracks[renameTargetIndex].displayName = document.getElementById('renameInput').value;
        renderPlaylist(); if (isEditMode) playlistEl.classList.add('edit-mode');
        if (currentTrackIndex === renameTargetIndex) nowPlayingEl.innerText = currentTracks[renameTargetIndex].displayName;
    }
    closeModal();
}

init();
</script>
</body>
</html>
